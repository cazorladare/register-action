name: Register and Daily Summary

on:
  schedule:
    - cron: '47 */2 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '执行模式'
        required: true
        default: 'register'
        type: choice
        options:
          - register
          - daily_summary
      provider:
        description: 'register 模式下使用的邮箱提供商'
        required: false
        default: 'cfmail'
        type: choice
        options:
          - cfmail
          - yydsmail
          - tempmail
      count:
        description: 'register 模式下的成功注册数量'
        required: false
        default: '20'
      summary_date:
        description: 'daily_summary 模式下要打包的 UTC+8 日期，格式 YYYY-MM-DD；留空则默认前一天'
        required: false
        default: ''

permissions:
  contents: read
  actions: read

jobs:
  register:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '47 */2 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'register')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CFMAIL_BASE: ${{ secrets.CFMAIL_BASE }}
      CFMAIL_DOMAINS: ${{ secrets.CFMAIL_DOMAINS }}
      CFMAIL_CUSTOM_AUTH: ${{ secrets.CFMAIL_CUSTOM_AUTH }}
      CFMAIL_USER_EMAIL: ${{ secrets.CFMAIL_USER_EMAIL }}
      CFMAIL_USER_PASSWORD: ${{ secrets.CFMAIL_USER_PASSWORD }}
      YYDSMAIL_API_BASE: ${{ secrets.YYDSMAIL_API_BASE }}
      YYDSMAIL_API_KEY: ${{ secrets.YYDSMAIL_API_KEY }}
      TEMPMAIL_LOL_BASE: ${{ secrets.TEMPMAIL_LOL_BASE }}
      REGISTER_PROVIDER_INPUT: ${{ github.event.inputs.provider }}
      REGISTER_PROVIDER_DEFAULT: ${{ secrets.REGISTER_PROVIDER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Random Start Delay
        run: |
          DELAY=$((RANDOM % 900))
          echo "🤖 本轮任务随机延迟 $DELAY 秒后启动..."
          echo "⏳ 等待时间约为 $((DELAY / 60)) 分 $((DELAY % 60)) 秒"
          sleep "$DELAY"

      - name: Run registration
        env:
          REG_COUNT: ${{ github.event.inputs.count || '30' }}
        run: |
          set -euo pipefail
          mkdir -p codex

          PROVIDER="${REGISTER_PROVIDER_INPUT:-}"
          if [ -z "$PROVIDER" ]; then
            PROVIDER="${REGISTER_PROVIDER_DEFAULT:-cfmail}"
          fi

          case "$PROVIDER" in
            cfmail)
              RUNNER="scripts/task_runner_cfmail.py"
              ;;
            yydsmail)
              RUNNER="scripts/task_runner_yydsmail.py"
              ;;
            tempmail)
              RUNNER="scripts/task_runner_tempmail.py"
              ;;
            *)
              echo "Unknown register provider: $PROVIDER"
              exit 1
              ;;
          esac

          echo "[*] 使用邮箱提供商: $PROVIDER"
          echo "[*] 目标成功注册数量: $REG_COUNT"
          python "$RUNNER" --target-successes "$REG_COUNT"

      - name: Upload tokens artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tokens-${{ github.run_number }}-${{ github.run_attempt }}
          path: codex/
          retention-days: 14
          if-no-files-found: ignore

  daily_summary:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily_summary')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build previous-day bundle
        id: bundle
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SUMMARY_DATE: ${{ github.event.inputs.summary_date }}
        run: |
          set -euo pipefail

          ARGS=(
            --repo "${GITHUB_REPOSITORY}"
            --output-dir "daily_bundle"
            --github-output "${GITHUB_OUTPUT}"
          )

          if [ -n "${SUMMARY_DATE:-}" ]; then
            ARGS+=(--local-date "${SUMMARY_DATE}")
          fi

          python scripts/daily_artifact_bundle.py "${ARGS[@]}"

      - name: Send Telegram summary
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TARGET_DATE: ${{ steps.bundle.outputs.target_date }}
          JSON_COUNT: ${{ steps.bundle.outputs.json_count }}
          ARTIFACT_COUNT: ${{ steps.bundle.outputs.artifact_count }}
          WINDOW_START_UTC: ${{ steps.bundle.outputs.window_start_utc }}
          WINDOW_END_UTC: ${{ steps.bundle.outputs.window_end_utc }}
          ZIP_PATH: ${{ steps.bundle.outputs.zip_path }}
        run: |
          set -euo pipefail

          if [ -z "${TG_BOT_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
            echo "Telegram secrets not set, skipping notification"
            exit 0
          fi

          if [ -n "${ZIP_PATH:-}" ] && [ -f "${ZIP_PATH}" ] && [ "${JSON_COUNT:-0}" -gt 0 ]; then
            CAPTION=$(
              printf '%s\n' \
                "📦 UTC+8 ${TARGET_DATE} 全量打包" \
                "JSON 数量: ${JSON_COUNT}" \
                "来源 artifacts: ${ARTIFACT_COUNT}" \
                "时间窗口(UTC): ${WINDOW_START_UTC} ~ ${WINDOW_END_UTC}"
            )
            curl --fail-with-body -sS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${TG_CHAT_ID}" \
              -F "document=@${ZIP_PATH}" \
              -F "caption=${CAPTION}"
          else
            MSG=$(
              printf '%s\n' \
                "📦 Daily bundle" \
                "日期(UTC+8): ${TARGET_DATE}" \
                "结果: 无可打包产物" \
                "来源 artifacts: ${ARTIFACT_COUNT}" \
                "时间窗口(UTC): ${WINDOW_START_UTC} ~ ${WINDOW_END_UTC}"
            )
            curl --fail-with-body -sS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=${MSG}"
          fi
